<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishlist — ToyVerse</title>
  <link rel="stylesheet" href="/src/index.css" />
  <style>
    .wishlist-header {
      padding-top: calc(72px + 2.5rem);
      padding-bottom: 2.5rem;
      background: linear-gradient(180deg, rgba(236,72,153,0.08) 0%, transparent 100%);
    }
    .wishlist-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .wishlist-title { font-size: clamp(2.2rem, 5vw, 3.5rem); }
    .wishlist-count-badge {
      background: rgba(236,72,153,0.12);
      border: 1px solid rgba(236,72,153,0.3);
      color: #ec4899;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.4rem 1rem;
      border-radius: 9999px;
    }

    /* ── Toolbar ── */
    .wishlist-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.75rem;
    }
    .wishlist-sort {
      font-size: 0.8rem;
      padding: 0.5rem 0.85rem;
      width: auto;
    }
    .add-all-btn {
      padding: 0.55rem 1.25rem;
      font-size: 0.85rem;
    }

    /* ── Empty state ── */
    .wishlist-empty {
      display: none;
      text-align: center;
      padding: 5rem 2rem;
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: 1.25rem;
    }
    .wishlist-empty-icon  { font-size: 4rem; margin-bottom: 1.25rem; display: block; }
    .wishlist-empty-title { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .wishlist-empty-sub   { color: #6b7280; margin-bottom: 2rem; }

    /* ── Wishlist product card extends product-card ── */
    .wishlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 1.5rem;
    }

    /* Remove from wishlist btn overlay */
    .product-card { position: relative; }
    .wishlist-remove-btn {
      position: absolute;
      top: 0.6rem;
      left: 0.6rem;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(15,15,15,0.8);
      border: 1px solid var(--border-dim);
      color: #9ca3af;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      z-index: 2;
    }
    .wishlist-remove-btn:hover {
      background: rgba(248,113,113,0.15);
      border-color: #f87171;
      color: #f87171;
    }

    /* ── Move-all toast ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      display: none;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      animation: slideInUp 0.4s ease;
      max-width: 320px;
      z-index: 999;
    }
    .toast-icon { font-size: 1.25rem; }
    .toast-msg  { font-size: 0.875rem; color: #d1d5db; }

    /* ── Recommendations ── */
    .rec-title { font-size: clamp(1.5rem,3vw,2rem); margin-bottom: 2rem; }
  </style>
</head>
<body>

  <div id="app-navbar"></div>

  <!-- Header -->
  <div class="wishlist-header">
    <div class="page-wrapper">
      <div class="wishlist-title-row">
        <h1 class="heading-gradient wishlist-title">My Wishlist</h1>
        <span class="wishlist-count-badge" id="wishlist-header-count">0 items</span>
      </div>
    </div>
  </div>

  <div class="page-wrapper padding-bottom:5rem">

    <!-- Toolbar -->
    <div class="wishlist-toolbar display:none" id="wishlist-toolbar">
      <select class="input-base wishlist-sort" id="wishlist-sort" aria-label="Sort wishlist">
        <option value="added">Recently Added</option>
        <option value="price-low">Price: Low → High</option>
        <option value="price-high">Price: High → Low</option>
        <option value="rating">Highest Rated</option>
      </select>
      <button class="btn-primary add-all-btn" id="add-all-btn" type="button">
        Add All to Cart
      </button>
    </div>

    <!-- Empty state -->
    <div class="wishlist-empty" id="wishlist-empty">
      <span class="wishlist-empty-icon" aria-hidden="true">🤍</span>
      <h2 class="wishlist-empty-title">Your wishlist is empty</h2>
      <p class="wishlist-empty-sub">Save items you love and come back to them anytime.</p>
      <a href="/pages/products.html" class="btn-primary padding:0.8rem 2rem">Browse Products</a>
    </div>

    <!-- Wishlist grid -->
    <div class="wishlist-grid" id="wishlist-grid" aria-live="polite" aria-label="Wishlist items"></div>

    <!-- Recommendations section -->
    <section id="rec-section" class="padding-top:4rem;display:none">
      <h2 class="heading-gradient rec-title">You Might Also Like</h2>
      <div class="product-grid" id="rec-grid"></div>
    </section>

  </div>

  <div id="app-footer"></div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite">
    <span class="toast-icon" id="toast-icon" aria-hidden="true"></span>
    <span class="toast-msg" id="toast-msg"></span>
  </div>

  <script type="module">
    import {
      allProducts,
      getCart, saveCart, getWishlist, saveWishlist,
      addToCart, discountPct, starsHTML,
      mountNavbar, mountFooter,
      productCardHTML, bindProductGrid,
    } from '../src/data/data.js'

    mountNavbar()
    mountFooter()

    // ── Toast ──
    function showToast(msg, icon, color) {
      document.getElementById('toast-msg').textContent  = msg
      document.getElementById('toast-icon').textContent = icon || '✓'
      document.getElementById('toast-icon').style.color = color || '#4ade80'
      const t = document.getElementById('toast')
      t.style.display = 'flex'
      clearTimeout(window._toast)
      window._toast = setTimeout(() => { t.style.display = 'none' }, 3000)
    }

    // ── Render ──
    function getSortedWishlistProducts() {
      const ids    = getWishlist()
      let products = ids.map(id => allProducts.find(p => p.id === id)).filter(Boolean)
      const sort   = document.getElementById('wishlist-sort')?.value || 'added'
      switch (sort) {
        case 'price-low':  products.sort((a,b) => a.price - b.price);    break
        case 'price-high': products.sort((a,b) => b.price - a.price);    break
        case 'rating':     products.sort((a,b) => b.rating - a.rating);  break
      }
      return products
    }

    function render() {
      const products  = getSortedWishlistProducts()
      const grid      = document.getElementById('wishlist-grid')
      const empty     = document.getElementById('wishlist-empty')
      const toolbar   = document.getElementById('wishlist-toolbar')
      const countBadge = document.getElementById('wishlist-header-count')
      const recSection = document.getElementById('rec-section')

      countBadge.textContent = products.length + ' item' + (products.length !== 1 ? 's' : '')

      if (!products.length) {
        grid.innerHTML       = ''
        empty.style.display  = 'block'
        toolbar.style.display = 'none'
        recSection.style.display = 'none'
        return
      }

      empty.style.display   = 'none'
      toolbar.style.display = 'flex'

      // Build cards with remove button overlay
      grid.innerHTML = products.map(product => {
        const pct    = discountPct(product)
        const badge  = pct > 0 ? '<div class="product-badge">-' + pct + '%</div>' : ''
        const orig   = pct > 0 ? '<span class="price-original">$' + product.originalPrice.toFixed(2) + '</span>' : ''

        return (
          '<div class="product-card" data-id="' + product.id + '">' +
            '<button class="wishlist-remove-btn" data-remove="' + product.id + '" type="button" aria-label="Remove ' + product.name + ' from wishlist" title="Remove from wishlist">✕</button>' +
            '<div class="product-card-img">' +
              '<span>' + product.emoji + '</span>' + badge +
            '</div>' +
            '<div class="product-card-body">' +
              '<div class="product-name">' + product.name + '</div>' +
              '<div class="product-cat">'  + product.category + '</div>' +
              '<div class="product-stars">' +
                '<span class="stars">' + starsHTML(product.rating) + '</span>' +
                '<span class="review-count">(' + product.reviews.toLocaleString() + ')</span>' +
              '</div>' +
              '<div class="product-price">' +
                '<span class="price-current">$' + product.price.toFixed(2) + '</span>' + orig +
              '</div>' +
              '<div class="product-actions">' +
                '<button class="btn-add" data-action="add" data-id="' + product.id + '">Add to Cart</button>' +
                '<button class="btn-wish active" data-action="wish" data-id="' + product.id + '">\u2764\ufe0f</button>' +
              '</div>' +
            '</div>' +
          '</div>'
        )
      }).join('')

      // Remove buttons
      grid.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id      = Number(btn.dataset.remove)
          const product = allProducts.find(p => p.id === id)
          const wl      = getWishlist().filter(i => i !== id)
          saveWishlist(wl)
          showToast((product?.name || 'Item') + ' removed from wishlist', '🤍', '#ec4899')
          render()
        })
      })

      // Add to cart + wishlist toggle via existing binding
      grid.querySelectorAll('[data-action="add"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id      = Number(btn.dataset.id)
          const product = allProducts.find(p => p.id === id)
          if (!product) return
          addToCart(product)
          btn.textContent = '\u2713 Added'
          btn.classList.add('added')
          showToast(product.name + ' added to cart!', '\uD83D\uDED2', '#a855f7')
          setTimeout(() => { btn.textContent = 'Add to Cart'; btn.classList.remove('added') }, 1600)
        })
      })

      grid.querySelectorAll('[data-action="wish"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = Number(btn.dataset.id)
          const wl = getWishlist().filter(i => i !== id)
          saveWishlist(wl)
          render()
        })
      })

      // Recommendations — products NOT in wishlist, same category
      const wishlistIds  = getWishlist()
      const cats         = [...new Set(products.map(p => p.category))]
      const recs         = allProducts
        .filter(p => !wishlistIds.includes(p.id) && cats.includes(p.category))
        .slice(0, 4)

      if (recs.length) {
        recSection.style.display = 'block'
        const recGrid = document.getElementById('rec-grid')
        recGrid.innerHTML = recs.map(productCardHTML).join('')
        bindProductGrid(recGrid)
      } else {
        recSection.style.display = 'none'
      }
    }

    // Add all to cart
    document.getElementById('add-all-btn').addEventListener('click', () => {
      const products = getSortedWishlistProducts()
      products.forEach(p => addToCart(p))
      showToast(products.length + ' items added to cart!', '\uD83C\uDF89', '#a855f7')
    })

    // Sort change
    document.getElementById('wishlist-sort').addEventListener('change', render)

    // Re-render on wishlist change
    window.addEventListener('tv:wishlist-updated', render)

    render()
  </script>

</body>
</html>
